<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ML Engineer Skill Map</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    gap:60px;
}

/* chart */

#chartBox{
    width:500px;
}

/* skill popup */

#skillsPopup{

    width:350px;
    min-height:200px;

    background:#1e293b;
    border-radius:10px;

    padding:20px;

    transition:opacity 0.2s;
}

.skill{
    display:inline-block;
    background:#334155;
    padding:6px 10px;
    margin:5px;
    border-radius:6px;
}

.hidden{
    opacity:0.2;
}

</style>
</head>

<body>

<div class="container">

<div id="chartBox">
<canvas id="pieChart"></canvas>
</div>

<div id="skillsPopup" class="hidden">

<h3 id="popupTitle">Hover category</h3>

<div id="popupSkills"></div>

</div>

</div>

<script>

const skills = {

"Machine Learning":[
"scikit-learn",
"xgboost",
"lightgbm",
"statsmodels",
"optuna"
],

"Deep Learning":[
"PyTorch",
"PyTorch Lightning",
"ONNX",
"tflite",
"OpenCV",
"Ultralytics YOLO",
"mediapipe",
"transformers",
"faiss",
"LangChain"
],

"Data Science":[
"numpy",
"pandas",
"GeoPandas",
"matplotlib",
"seaborn"
],

"MLOps":[
"MLflow",
"DagsHub",
"Azure",
"AWS Lambda",
"AWS S3",
"Docker",
"Kubernetes",
"RabbitMQ",
"FastAPI",
"Jenkins",
"Github Actions",
"Evidently",
"Apache Airflow"
],

"Databases":[
"MySQL",
"PostgreSQL",
"MongoDB",
"SQLite"
],

"Programming":[
"Python",
"C++"
],

"Engineering":[
"Linux",
"Git",
"System Design",
"Project Management",
"JupyterLab"
]

}

const labels = Object.keys(skills)
const counts = labels.map(x=>skills[x].length)



function showSkills(category){

const title=document.getElementById("popupTitle")
const div=document.getElementById("popupSkills")
const box=document.getElementById("skillsPopup")

title.innerText=category

div.innerHTML=""

skills[category].forEach(skill=>{

const span=document.createElement("span")
span.className="skill"
span.innerText=skill

div.appendChild(span)

})

box.classList.remove("hidden")

}



function clearSkills(){

const title=document.getElementById("popupTitle")
const div=document.getElementById("popupSkills")
const box=document.getElementById("skillsPopup")

title.innerText="Hover category"
div.innerHTML=""
box.classList.add("hidden")

}



new Chart(document.getElementById("pieChart"),{

type:"pie",

data:{
labels:labels,
datasets:[{
data:counts
}]
},

options:{

onHover:(event,elements)=>{

if(elements.length){

const index=elements[0].index
const category=labels[index]

showSkills(category)

}else{

clearSkills()

}

},

plugins:{
tooltip:{enabled:false}
}

}

})

</script>

</body>
</html>
