<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ML Engineer Skill Map</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

font-family:"Inter",sans-serif;

background: radial-gradient(circle at 20% 20%, #1e293b, #020617);

color:white;

height:100vh;

display:flex;
align-items:center;
justify-content:center;

}


/* layout */

.container{

display:flex;
gap:60px;

align-items:center;

padding:40px;

}


/* chart card */

#chartBox{

width:520px;

padding:30px;

border-radius:20px;

background:rgba(255,255,255,0.05);

backdrop-filter:blur(10px);

box-shadow:
0 10px 30px rgba(0,0,0,0.4);

}


/* skills panel */

#skillsPopup{

width:360px;
min-height:260px;

padding:30px;

border-radius:20px;

background:rgba(255,255,255,0.07);

backdrop-filter:blur(10px);

box-shadow:
0 10px 30px rgba(0,0,0,0.35);

transition:all 0.25s ease;

}


#popupTitle{

font-size:20px;
font-weight:600;

margin-bottom:20px;

opacity:0.9;

}


/* skill tags */

.skill{

display:inline-block;

padding:8px 14px;

margin:6px;

border-radius:999px;

background:linear-gradient(135deg,#6366f1,#8b5cf6);

font-size:13px;

letter-spacing:0.3px;

transition:transform 0.15s ease;

}


.skill:hover{

transform:scale(1.08);

}


/* empty state */

.hidden{

opacity:0.4;

}


/* subtle chart hover scale */

canvas{

transition:transform 0.25s ease;

}

canvas:hover{

transform:scale(1.03);

}

</style>

</head>

<body>

<div class="container">

<div id="chartBox">
<canvas id="pieChart"></canvas>
</div>

<div id="skillsPopup" class="hidden">

<div id="popupTitle">Hover category</div>

<div id="popupSkills"></div>

</div>

</div>

<script>

const skills = {

"Machine Learning":[
"scikit-learn",
"xgboost",
"lightgbm",
"statsmodels",
"optuna"
],

"Deep Learning":[
"PyTorch",
"PyTorch Lightning",
"ONNX",
"tflite",
"OpenCV",
"Ultralytics YOLO",
"mediapipe",
"transformers",
"faiss",
"LangChain"
],

"Data Science":[
"numpy",
"pandas",
"GeoPandas",
"matplotlib",
"seaborn"
],

"MLOps":[
"MLflow",
"DagsHub",
"Azure",
"AWS Lambda",
"AWS S3",
"Docker",
"Kubernetes",
"RabbitMQ",
"FastAPI",
"Jenkins",
"Github Actions",
"Evidently",
"Apache Airflow"
],

"Databases":[
"MySQL",
"PostgreSQL",
"MongoDB",
"SQLite"
],

"Programming":[
"Python",
"C++"
],

"Engineering":[
"Linux",
"Git",
"System Design",
"Project Management",
"JupyterLab"
]

}

const labels = Object.keys(skills)
const counts = labels.map(x=>skills[x].length)



function showSkills(category){

const title=document.getElementById("popupTitle")
const div=document.getElementById("popupSkills")
const box=document.getElementById("skillsPopup")

title.innerText=category

div.innerHTML=""

skills[category].forEach(skill=>{

const span=document.createElement("span")
span.className="skill"
span.innerText=skill

div.appendChild(span)

})

box.classList.remove("hidden")

}


function clearSkills(){

const title=document.getElementById("popupTitle")
const div=document.getElementById("popupSkills")
const box=document.getElementById("skillsPopup")

title.innerText="Hover category"
div.innerHTML=""

box.classList.add("hidden")

}


new Chart(document.getElementById("pieChart"),{

type:"pie",

data:{

labels:labels,

datasets:[{

data:counts,

backgroundColor:[
"#6366f1",
"#8b5cf6",
"#06b6d4",
"#10b981",
"#f59e0b",
"#ef4444",
"#a855f7"
]

}]

},

options:{

onHover:(event,elements)=>{

if(elements.length){

const index=elements[0].index
const category=labels[index]

showSkills(category)

}else{

clearSkills()

}

},

plugins:{
tooltip:{enabled:false},
legend:{
labels:{
color:"white"
}
}
}

}

})

</script>

</body>
</html>
