<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ML Engineer Skill Map</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    text-align:center;
}

.container{
    width:900px;
    margin:auto;
}

/* modal overlay */

#modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

/* modal window */

#modalContent{
    background:#1e293b;
    padding:30px;
    border-radius:10px;
    width:500px;
}

.skill{
    display:inline-block;
    padding:6px 10px;
    margin:5px;
    background:#334155;
    border-radius:6px;
}

.close{
    float:right;
    cursor:pointer;
    font-size:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>ML Engineer Skill Distribution</h1>

<canvas id="pieChart"></canvas>

<canvas id="radarChart"></canvas>

</div>


<!-- modal -->

<div id="modal">

<div id="modalContent">

<span class="close" onclick="closeModal()">×</span>

<h2 id="modalTitle"></h2>

<div id="modalSkills"></div>

</div>

</div>


<script>

const skills = {

"Machine Learning":[
"scikit-learn",
"xgboost",
"lightgbm",
"statsmodels",
"optuna"
],

"Deep Learning":[
"PyTorch",
"PyTorch Lightning",
"ONNX",
"tflite",
"OpenCV",
"Ultralytics YOLO",
"mediapipe",
"transformers",
"faiss",
"LangChain"
],

"Data Science":[
"numpy",
"pandas",
"GeoPandas",
"matplotlib",
"seaborn"
],

"MLOps":[
"MLflow",
"DagsHub",
"Azure",
"AWS Lambda",
"AWS S3",
"Docker",
"Kubernetes",
"RabbitMQ",
"FastAPI",
"Jenkins",
"Github Actions",
"Evidently",
"Apache Airflow"
],

"Databases":[
"MySQL",
"PostgreSQL",
"MongoDB",
"SQLite"
],

"Programming":[
"Python",
"C++"
],

"Engineering":[
"Linux",
"Git",
"System Design",
"Project Management",
"JupyterLab"
]

}

const labels = Object.keys(skills)
const counts = labels.map(l => skills[l].length)



function openModal(category){

document.getElementById("modal").style.display="flex"

document.getElementById("modalTitle").innerText=category

const skillsDiv=document.getElementById("modalSkills")

skillsDiv.innerHTML=""

skills[category].forEach(skill=>{

const span=document.createElement("span")
span.className="skill"
span.innerText=skill

skillsDiv.appendChild(span)

})

}


function closeModal(){

document.getElementById("modal").style.display="none"

}


/* PIE CHART */

new Chart(document.getElementById("pieChart"),{

type:"pie",

data:{
labels:labels,
datasets:[{data:counts}]
},

options:{

animation:{
duration:1500
},

onClick:(event,elements)=>{

if(elements.length){

const index=elements[0].index
const category=labels[index]

openModal(category)

}

}

}

})


/* RADAR CHART */

new Chart(document.getElementById("radarChart"),{

type:"radar",

data:{
labels:labels,
datasets:[{
label:"Skill Coverage",
data:counts,
fill:true
}]
},

options:{
animation:{duration:2000},
scales:{
r:{beginAtZero:true}
}
}

})


/* close modal if clicking outside */

window.onclick=function(event){

const modal=document.getElementById("modal")

if(event.target==modal){

closeModal()

}

}

</script>

</body>
</html>
